# Render.com deployment configuration
# Inspections PWA - Monograph Architects

services:
  - type: web
    name: inspections-pwa
    runtime: python
    buildCommand: |
      apt-get update && apt-get install -y \
        libpango-1.0-0 \
        libpangocairo-1.0-0 \
        libpangoft2-1.0-0 \
        libgdk-pixbuf2.0-0 \
        libffi-dev \
        libcairo2 \
        libnss3 \
        libnspr4 \
        libdbus-1-3 \
        libatk1.0-0t64 \
        libatk-bridge2.0-0t64 \
        libcups2t64 \
        libdrm2 \
        libatspi2.0-0t64 \
        libxcomposite1 \
        libxdamage1 \
        libxfixes3 \
        libxrandr2 \
        libgbm1 \
        libxkbcommon0 \
        libasound2t64 \
        && pip install -r requirements.txt
    startCommand: gunicorn 'app:create_app()' --bind 0.0.0.0:$PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_PATH
        value: /opt/render/project/src/data/inspections.db
      - key: PLAYWRIGHT_BROWSERS_PATH
        value: /opt/render/project/src/data/.playwright
    disk:
      name: inspections-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
