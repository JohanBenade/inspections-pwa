<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Site Meeting Brief</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=DM+Sans:wght@400;500;600;700&display=swap');

@page {
    size: A4;
    margin: 18mm 16mm 22mm 16mm;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    font-family: "DM Sans", "Helvetica Neue", Helvetica, Arial, sans-serif;
    color: #1A1A1A;
    background: #FFFFFF;
    font-size: 11px;
    line-height: 1.5;
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
}

.page { max-width: 800px; margin: 0 auto; padding: 0; }

/* Toolbar - screen only */
.toolbar {
    position: fixed; top: 16px; right: 16px;
    display: flex; gap: 8px; z-index: 100;
}
.toolbar a, .toolbar button {
    padding: 8px 16px; font-family: "DM Sans", Helvetica, Arial, sans-serif;
    font-size: 12px; font-weight: 600; border: none; border-radius: 4px;
    cursor: pointer; text-decoration: none; display: inline-block;
}
.btn-pdf { background: #C8963E; color: white; }
.btn-pdf:hover { background: #D4A94F; }
.btn-print { background: #F5F3EE; color: #1A1A1A; border: 1px solid #E8E6E1; }
.btn-print:hover { background: #E8E6E1; }
.btn-back { background: #F5F3EE; color: #1A1A1A; border: 1px solid #E8E6E1; }
@media print { .toolbar { display: none !important; } }

/* Header */
.report-header {
    padding-bottom: 16px; border-bottom: 3px solid #0A0A0A; margin-bottom: 20px;
}
.header-top { margin-bottom: 20px; overflow: hidden; }
.logo-area { float: left; }
.logo-area img { height: 36px; width: auto; }
.logo-fallback {
    font-family: "DM Sans", Helvetica, Arial, sans-serif;
    font-size: 22px; font-weight: 300; letter-spacing: 6px; text-transform: uppercase; color: #0A0A0A;
}
.logo-sub {
    font-family: "DM Sans", Helvetica, Arial, sans-serif;
    font-size: 12px; font-weight: 300; letter-spacing: 3px; color: #6B6B6B; margin-left: 8px;
}
.header-meta {
    float: right; text-align: right; font-size: 10px;
    letter-spacing: 1.5px; text-transform: uppercase; color: #6B6B6B;
}
.header-meta .date {
    font-size: 11px; font-weight: 600; color: #1A1A1A; margin-bottom: 2px;
}
.report-title {
    font-family: "Cormorant Garamond", Georgia, serif;
    font-size: 32px; font-weight: 400; letter-spacing: -0.5px;
    color: #0A0A0A; margin-top: 8px;
}
.report-subtitle {
    font-size: 12px; color: #6B6B6B; margin-top: 4px;
    letter-spacing: 0.5px;
}
</style>
</head>
<body>

{% if not is_pdf %}
<div class="toolbar">
    <a href="{{ url_for('analytics.site_meeting_brief_pdf') }}" class="btn-pdf"
       onclick="var b=this; b.textContent='Preparing...'; b.style.opacity='0.6'; b.style.pointerEvents='none'; setTimeout(function(){b.textContent='Download PDF'; b.style.opacity='1'; b.style.pointerEvents='auto';}, 5000);">
        Download PDF
    </a>
    <button class="btn-print" onclick="window.print()">Print</button>
</div>
{% endif %}

<div class="page">

    <!-- HEADER -->
    <div class="report-header">
        <div class="header-top">
            <div class="logo-area">
                {% if logo_b64 %}
                <img src="data:image/jpeg;base64,{{ logo_b64 }}" alt="Monograph Architects">
                {% else %}
                <span class="logo-fallback">MONOGRAPH</span>
                <span class="logo-sub">architects</span>
                {% endif %}
            </div>
            <div class="header-meta">
                <div class="date">{{ report_date }}</div>
                <div>FORTNIGHTLY BRIEF</div>
            </div>
        </div>
        <div class="report-title">Site Meeting Brief</div>
        <div class="report-subtitle">Power Park Student Housing &mdash; Phase 3 &mdash; 191 Units</div>
    </div>

    <!-- Sections will be added in subsequent commits -->

</div>

</body>
</html>
