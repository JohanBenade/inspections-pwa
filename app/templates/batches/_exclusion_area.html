<!-- Exclusion area partial - loaded via HTMX -->
<div class="space-y-4">
    <div class="flex justify-end mb-2">
        <a href="javascript:void(0)" id="toggle-all-btn"
           onclick="var cats=document.querySelectorAll('.cat-content');var chevs=document.querySelectorAll('.cat-chevron');var anyHidden=false;cats.forEach(function(c){if(c.classList.contains('hidden'))anyHidden=true});cats.forEach(function(c){if(anyHidden)c.classList.remove('hidden');else c.classList.add('hidden')});chevs.forEach(function(ch){if(anyHidden)ch.classList.add('rotate-90');else ch.classList.remove('rotate-90')});this.textContent=anyHidden?'Collapse All':'Expand All';return false"
           class="text-sm text-blue-600 font-medium" style="text-decoration:none">
            Expand All
        </a>
    </div>

    {% for category in categories %}
    <div class="border rounded-lg overflow-hidden" data-cat-idx="{{ loop.index0 }}">
        <!-- Category Header -->
        <div class="bg-gray-100 px-4 py-3 border-b flex items-center select-none">
            <div onclick="var h=this.closest('.bg-gray-100');var c=h.nextElementSibling;var ch=this.querySelector('.cat-chevron');if(c)c.classList.toggle('hidden');if(ch)ch.classList.toggle('rotate-90')"
                 class="flex items-center justify-center flex-shrink-0 mr-1 cursor-pointer"
                 role="button"
                 style="width:44px;height:44px;margin:-8px 0 -8px -10px">
                <svg class="cat-chevron w-4 h-4 text-gray-400 transform transition-transform duration-200"
                     fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
                </svg>
            </div>
            <h3 class="font-semibold text-gray-800 flex-1">
                {{ category.name }}
            </h3>
            <span class="cat-badge ml-2 {% if category.excluded > 0 %}bg-orange-500 text-white text-xs px-1.5 py-0.5 rounded-full font-medium{% else %}hidden{% endif %}">{{ category.excluded }}</span>
            <span class="cat-count text-xs ml-2 {% if category.excluded > 0 %}text-orange-600 font-semibold{% else %}text-gray-500{% endif %}">
                {{ category.excluded }}/{{ category.total }}
            </span>
        </div>

        <!-- Category Content - always collapsed -->
        <div class="cat-content hidden">
            <div class="divide-y">
                {% for item in category.checklist %}
                <div id="excl-{{ item.id }}" class="px-4 py-2 {% if item.depth > 0 %}pl-8{% endif %} hover:bg-gray-50">
                    <label class="flex items-center gap-3 cursor-pointer">
                        <input type="checkbox"
                               {% if item.is_excluded %}checked{% endif %}
                               class="excl-checkbox rounded border-gray-300 text-orange-600 focus:ring-orange-500 flex-shrink-0"
                               style="width:20px;height:20px"
                               hx-post="{{ url_for('cycles.toggle_exclusion', cycle_id=cycle_id) }}"
                               hx-vals='{"item_id": "{{ item.id }}"}'
                               hx-swap="none"
                               hx-on::after-request="handleExclToggle(this)">
                        <span class="excl-label text-sm {% if item.is_excluded %}text-orange-600 line-through{% else %}text-gray-700{% endif %}">
                            {{ item.item_description }}
                        </span>
                    </label>
                </div>
                {% endfor %}
            </div>
        </div>
    </div>
    {% endfor %}
</div>

<script>
function handleExclToggle(cb) {
    // 1. Toggle label style
    var lbl = cb.closest('label').querySelector('.excl-label');
    if (cb.checked) {
        lbl.classList.add('line-through', 'text-orange-600');
        lbl.classList.remove('text-gray-700');
    } else {
        lbl.classList.remove('line-through', 'text-orange-600');
        lbl.classList.add('text-gray-700');
    }

    // 2. Update category count
    var catDiv = cb.closest('[data-cat-idx]');
    var header = catDiv.querySelector('.bg-gray-100');
    var countSpan = header.querySelector('.cat-count');
    var badge = header.querySelector('.cat-badge');

    // Count checked boxes in this category
    var checked = catDiv.querySelectorAll('.excl-checkbox:checked').length;
    var total = catDiv.querySelectorAll('.excl-checkbox').length;

    countSpan.textContent = checked + '/' + total;
    if (checked > 0) {
        countSpan.classList.add('text-orange-600', 'font-semibold');
        countSpan.classList.remove('text-gray-500');
        badge.textContent = checked;
        badge.classList.remove('hidden');
        badge.classList.add('bg-orange-500', 'text-white', 'text-xs', 'px-1.5', 'py-0.5', 'rounded-full', 'font-medium');
    } else {
        countSpan.classList.remove('text-orange-600', 'font-semibold');
        countSpan.classList.add('text-gray-500');
        badge.classList.add('hidden');
    }

    // 3. Fire event for header + area tab refresh
    document.body.dispatchEvent(new CustomEvent('exclToggled'));
}
</script>
