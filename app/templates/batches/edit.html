{% extends "base.html" %}
{% block title %}Edit {{ batch.name }}{% endblock %}

{% block breadcrumb %}
<div class="max-w-7xl mx-auto px-4 pt-3">
    <a href="{{ url_for('batches.detail', batch_id=batch.id) }}" class="text-sm text-gray-500 hover:text-gray-700">&larr; Back to Batch</a>
</div>
{% endblock %}

{% block content %}
<h1 class="text-2xl font-bold text-gray-800 mb-6">Edit Batch</h1>

<form method="POST" class="space-y-6 max-w-2xl">
    <div>
        <label for="name" class="block text-sm font-medium text-gray-700 mb-1">Batch Name</label>
        <input type="text" id="name" name="name" value="{{ batch.name }}"
               class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
               required>
    </div>

    <div>
        <label for="notes" class="block text-sm font-medium text-gray-700 mb-1">General Notes</label>
        <textarea id="notes" name="notes" rows="3"
                  class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                  placeholder="Optional notes about this batch">{{ batch.notes or '' }}</textarea>
    </div>

    <div>
        <label for="exclusion_notes" class="block text-sm font-medium text-gray-700 mb-1">Exclusion Notes</label>
        <p class="text-xs text-gray-500 mb-2">Explain why items are excluded (appears on reports). One reason per line.</p>
        <textarea id="exclusion_notes" name="exclusion_notes" rows="8"
                  class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm font-mono focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                  placeholder="e.g. WiFi Repeater not installed&#10;Front door not inspected at Contractor's request">{{ batch.exclusion_notes or '' }}</textarea>
    </div>

    <div class="flex items-center gap-3 pt-2">
        <button type="submit"
                class="px-4 py-2 text-sm font-semibold rounded-lg bg-blue-600 text-white hover:bg-blue-700">
            Save Changes
        </button>
        <a href="{{ url_for('batches.detail', batch_id=batch.id) }}"
           class="px-4 py-2 text-sm font-semibold rounded-lg bg-gray-100 text-gray-600 hover:bg-gray-200">
            Cancel
        </a>
    </div>
</form>
{% endblock %}
